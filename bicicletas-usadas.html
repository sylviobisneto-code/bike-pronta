<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Bicicletas Usadas</title>
    <style>
        body { background:#1c1f26; color:white; font-family:Arial; padding:20px; }
        h1 { text-align:center; margin-bottom:20px; }
        .grid {
            display:flex;
            gap:20px;
            flex-wrap:wrap;
            justify-content:center;
        }
        .bike {
            background:#243042;
            padding:20px;
            border-radius:8px;
            width:280px;
            text-align:center;
        }
        .bike img {
            width:100%;
            border-radius:8px;
        }
    </style>
</head>
<body>

<h1>Bicicletas Usadas à Venda</h1>

<div class="grid">
    <div class="bike">
        <img src="IMAGEM1.jpg">
        <h3>Bicicleta ARO 29</h3>
        <p>Revisada, pronta para uso.</p>
        <p><strong>R$ XXX,00</strong></p>
    </div>

    <div class="bike">
        <img src="IMAGEM2.jpg">
        <h3>Bicicleta Speed</h3>
        <p>Ótimo estado.</p>
        <p><strong>R$ XXX,00</strong></p>
    </div>
</div>

</body>
</html>
